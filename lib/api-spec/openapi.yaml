    DayActivity:
      type: object
      required: [id, dayId, activityId, sortOrder, createdAt]
      properties:
        id:
          type: integer
        dayId:
          type: integer
        activityId:
          type: integer
        activityName:
          type: string
        activityCategory:
          type: ["string", "null"]
        sortOrder:
          type: integer
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    DayActivityInput:
      type: object
      required: [activityId]
      properties:
        activityId:
          type: integer
        sortOrder:
          type: integer
        notes:
          type: string

    # ─── DASHBOARD ───────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [tripsByStatus, totalTravelers, upcomingTrips, recentInvitations]
      properties:
        tripsByStatus:
          type: object
          required: [draft, scheduled, active, finished, cancelled]
          properties:
            draft:
              type: integer
            scheduled:
              type: integer
            active:
              type: integer
            finished:
              type: integer
            cancelled:
              type: integer
        totalTravelers:
          type: integer
        upcomingTrips:
          type: array
          items:
            $ref: "#/components/schemas/Trip"
        recentInvitations:
          type: array
          items:
            $ref: "#/components/schemas/Invitation"
        occupancyAlerts:
          type: array
          items:
            $ref: "#/components/schemas/Trip"
