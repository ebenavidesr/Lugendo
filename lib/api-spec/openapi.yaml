openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Lugendo — Travel agency management platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: agencies
    description: Agency management (Admin)
  - name: users
    description: User management
  - name: itineraries
    description: Itinerary templates
  - name: hotels
    description: Hotel catalog
  - name: trips
    description: Trip instances
  - name: invitations
    description: Traveler invitations
  - name: traveler
    description: Traveler front desk
  - name: activities
    description: Activity catalog
  - name: dashboard
    description: Dashboard aggregates
  - name: destinations
    description: Destination description generation
  - name: storage
    description: Object storage upload and serving endpoints
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: Server not ready (migrations pending)

  # ─── DESTINATIONS ───────────────────────────────────────────────────────────
  /destinations/describe:
    post:
      operationId: describeDestination
      tags: [destinations]
      summary: Generate an AI-powered destination description using web search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DestinationDescribeInput"
      responses:
        "200":
          description: Generated description
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DestinationDescribeResult"

  # ─── AUTH ───────────────────────────────────────────────────────────────────
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Unauthorized

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new traveler account (optionally with invite code)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Validation error

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "204":
          description: Logged out

  # ─── AGENCIES ───────────────────────────────────────────────────────────────
  /agencies:
    get:
      operationId: listAgencies
      tags: [agencies]
      summary: List all agencies (Admin only)
      responses:
        "200":
          description: List of agencies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agency"
    post:
      operationId: createAgency
      tags: [agencies]
      summary: Create a new agency (Admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgencyInput"
      responses:
        "201":
          description: Agency created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agency"

  /agencies/{agencyId}:
    get:
      operationId: getAgency
      tags: [agencies]
      summary: Get agency by ID
      parameters:
        - name: agencyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agency detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agency"
        "404":
          description: Not found
    patch:
      operationId: updateAgency
      tags: [agencies]
      summary: Update agency
      parameters:
        - name: agencyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgencyUpdate"
      responses:
        "200":
          description: Updated agency
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agency"

  # ─── USERS ──────────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users (scoped to agency for Manager/Agent)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create agency user (Admin/Manager)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ─── ITINERARIES ─────────────────────────────────────────────────────────────
  /itineraries:
    get:
      operationId: listItineraries
      tags: [itineraries]
      summary: List itineraries for the agency
      responses:
        "200":
          description: List of itineraries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Itinerary"
    post:
      operationId: createItinerary
      tags: [itineraries]
      summary: Create itinerary template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItineraryInput"
      responses:
        "201":
          description: Itinerary created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Itinerary"

  /itineraries/{itineraryId}:
    get:
      operationId: getItinerary
      tags: [itineraries]
      summary: Get itinerary detail with days
      parameters:
        - name: itineraryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Itinerary detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItineraryDetail"
        "404":
          description: Not found
    patch:
      operationId: updateItinerary
      tags: [itineraries]
      summary: Update itinerary
      parameters:
        - name: itineraryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItineraryUpdate"
      responses:
        "200":
          description: Updated itinerary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Itinerary"
    delete:
      operationId: deleteItinerary
      tags: [itineraries]
      summary: Delete itinerary (Admin/Manager) — unlinks linked trips then deletes
      parameters:
        - name: itineraryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted (with count of unlinked trips)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteItineraryResult"

  /itineraries/{itineraryId}/days:
    get:
      operationId: listItineraryDays
      tags: [itineraries]
      summary: List days for an itinerary
      parameters:
        - name: itineraryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of days
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItineraryDay"
    post:
      operationId: createItineraryDay
      tags: [itineraries]
      summary: Add a day to an itinerary
      parameters:
        - name: itineraryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItineraryDayInput"
      responses:
        "201":
          description: Day created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItineraryDay"

  /itineraries/{itineraryId}/days/{dayId}:
    patch:
      operationId: updateItineraryDay
      tags: [itineraries]
      summary: Update an itinerary day
      parameters:
        - name: itineraryId
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItineraryDayUpdate"
      responses:
        "200":
          description: Updated day
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItineraryDay"
    delete:
      operationId: deleteItineraryDay
      tags: [itineraries]
      summary: Delete an itinerary day
      parameters:
        - name: itineraryId
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── HOTELS ─────────────────────────────────────────────────────────────────
  /hotels:
    get:
      operationId: listHotels
      tags: [hotels]
      summary: List hotels in the agency catalog
      responses:
        "200":
          description: List of hotels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hotel"
    post:
      operationId: createHotel
      tags: [hotels]
      summary: Add hotel to agency catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HotelInput"
      responses:
        "201":
          description: Hotel created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hotel"

  /hotels/{hotelId}:
    get:
      operationId: getHotel
      tags: [hotels]
      summary: Get hotel detail
      parameters:
        - name: hotelId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hotel detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hotel"
        "404":
          description: Not found
    patch:
      operationId: updateHotel
      tags: [hotels]
      summary: Update hotel
      parameters:
        - name: hotelId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HotelUpdate"
      responses:
        "200":
          description: Updated hotel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hotel"

  # ─── ACTIVITIES ─────────────────────────────────────────────────────────────
  /activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: List activities in the agency catalog
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"
    post:
      operationId: createActivity
      tags: [activities]
      summary: Add activity to agency catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityInput"
      responses:
        "201":
          description: Activity created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  /activities/{activityId}:
    get:
      operationId: getActivity
      tags: [activities]
      summary: Get activity detail
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activity detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "404":
          description: Not found
    patch:
      operationId: updateActivity
      tags: [activities]
      summary: Update activity
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityUpdate"
      responses:
        "200":
          description: Updated activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
    delete:
      operationId: deleteActivity
      tags: [activities]
      summary: Delete activity
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── TRIPS ──────────────────────────────────────────────────────────────────
  /trips:
    get:
      operationId: listTrips
      tags: [trips]
      summary: List trips for the agency
      responses:
        "200":
          description: List of trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"
    post:
      operationId: createTrip
      tags: [trips]
      summary: Create a trip from an itinerary or from scratch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripInput"
      responses:
        "201":
          description: Trip created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{tripId}:
    get:
      operationId: getTrip
      tags: [trips]
      summary: Get trip detail with days and invitations
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trip detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetail"
        "404":
          description: Not found
    patch:
      operationId: updateTrip
      tags: [trips]
      summary: Update trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripUpdate"
      responses:
        "200":
          description: Updated trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
    delete:
      operationId: deleteTrip
      tags: [trips]
      summary: Delete or cancel a trip (admin/manager always; traveler only if owner)
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted or cancelled (with affected travelers count)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteTripResult"
        "403":
          description: Forbidden

  /trips/{tripId}/days:
    post:
      operationId: createTripDayAdmin
      tags: [trips]
      summary: Add a day to a trip (back-office)
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonalTripDayInput"
      responses:
        "201":
          description: Day created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDay"

  /trips/{tripId}/days/{dayId}:
    delete:
      operationId: deleteTripDayAdmin
      tags: [trips]
      summary: Delete a day from a trip (back-office)
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
    patch:
      operationId: updateTripDayAdmin
      tags: [trips]
      summary: Update a trip day (back-office)
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripDayUpdate"
      responses:
        "200":
          description: Updated day
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDay"

  # ─── TRIP DAY ACTIVITIES ─────────────────────────────────────────────────────
  /trips/{tripId}/days/{dayId}/activities:
    get:
      operationId: listTripDayActivities
      tags: [trips]
      summary: List activities linked to a trip day
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of trip day activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DayActivity"
    post:
      operationId: addTripDayActivity
      tags: [trips]
      summary: Link an activity to a trip day
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DayActivityInput"
      responses:
        "201":
          description: Activity linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DayActivity"

  /trips/{tripId}/days/{dayId}/activities/{linkId}:
    patch:
      operationId: updateTripDayActivity
      tags: [trips]
      summary: Update per-link fields (startTime, notes) for a trip day activity
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
        - name: linkId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripDayActivityUpdate"
      responses:
        "200":
          description: Updated trip day activity link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DayActivity"
        "404":
          description: Not found
    delete:
      operationId: removeTripDayActivity
      tags: [trips]
      summary: Unlink an activity from a trip day
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
        - name: linkId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Unlinked

  # ─── INVITATIONS ─────────────────────────────────────────────────────────────
  /trips/{tripId}/invitations:
    get:
      operationId: listInvitations
      tags: [invitations]
      summary: List invitations for a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of invitations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invitation"
    post:
      operationId: sendInvitations
      tags: [invitations]
      summary: Send invitations to travelers for a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationInput"
      responses:
        "201":
          description: Invitations sent
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invitation"

  /trips/{tripId}/invitations/{invitationId}:
    patch:
      operationId: updateInvitation
      tags: [invitations]
      summary: Update invitation (segment assignment)
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: invitationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationUpdateInput"
      responses:
        "200":
          description: Updated invitation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invitation"
        "404":
          description: Not found
    delete:
      operationId: deleteInvitation
      tags: [invitations]
      summary: Delete an invitation
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: invitationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /trips/{tripId}/documents:
    get:
      operationId: listTripDocumentsAdmin
      tags: [trips]
      summary: List all documents for a trip (back-office)
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripDocument"
        "403":
          description: Forbidden
        "404":
          description: Trip not found
    post:
      operationId: createTripDocumentAdmin
      tags: [trips]
      summary: Register a document for a trip (back-office, after uploading to object storage)
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripDocumentInput"
      responses:
        "201":
          description: Document registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDocument"
        "403":
          description: Forbidden

  /trips/{tripId}/documents/{documentId}:
    patch:
      operationId: renameTripDocumentAdmin
      tags: [trips]
      summary: Rename a document (back-office, admin/manager only)
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: documentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripDocumentRename"
      responses:
        "200":
          description: Renamed document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDocument"
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
