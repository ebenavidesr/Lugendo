openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Lugendo — Travel agency management platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: agencies
    description: Agency management (Admin)
  - name: users
    description: User management
  - name: itineraries
    description: Itinerary templates
  - name: hotels
    description: Hotel catalog
  - name: trips
    description: Trip instances
  - name: invitations
    description: Traveler invitations
  - name: traveler
    description: Traveler front desk
  - name: activities
    description: Activity catalog
  - name: dashboard
    description: Dashboard aggregates
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ───────────────────────────────────────────────────────────────────
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Unauthorized

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new traveler account (optionally with invite code)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Validation error

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "204":
          description: Logged out

  # ─── AGENCIES ───────────────────────────────────────────────────────────────
  /agencies:
    get:
      operationId: listAgencies
      tags: [agencies]
      summary: List all agencies (Admin only)
      responses:
        "200":
          description: List of agencies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agency"
    post:
      operationId: createAgency
      tags: [agencies]
      summary: Create a new agency (Admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgencyInput"
      responses:
        "201":
          description: Agency created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agency"

  /agencies/{agencyId}:
    get:
      operationId: getAgency
      tags: [agencies]
      summary: Get agency by ID
      parameters:
        - name: agencyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agency detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agency"
        "404":
          description: Not found
    patch:
      operationId: updateAgency
      tags: [agencies]
      summary: Update agency
      parameters:
        - name: agencyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgencyUpdate"
      responses:
        "200":
          description: Updated agency
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agency"

  # ─── USERS ──────────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users (scoped to agency for Manager/Agent)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create agency user (Admin/Manager)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ─── ITINERARIES ─────────────────────────────────────────────────────────────
  /itineraries:
    get:
      operationId: listItineraries
      tags: [itineraries]
      summary: List itineraries for the agency
      responses:
        "200":
          description: List of itineraries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Itinerary"
    post:
      operationId: createItinerary
      tags: [itineraries]
      summary: Create itinerary template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItineraryInput"
      responses:
        "201":
          description: Itinerary created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Itinerary"

  /itineraries/{itineraryId}:
    get:
      operationId: getItinerary
      tags: [itineraries]
      summary: Get itinerary detail with days
      parameters:
        - name: itineraryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Itinerary detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItineraryDetail"
        "404":
          description: Not found
    patch:
      operationId: updateItinerary
      tags: [itineraries]
      summary: Update itinerary
      parameters:
        - name: itineraryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItineraryUpdate"
      responses:
        "200":
          description: Updated itinerary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Itinerary"
    delete:
      operationId: deleteItinerary
      tags: [itineraries]
      summary: Delete itinerary (Admin only)
      parameters:
        - name: itineraryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /itineraries/{itineraryId}/days:
    get:
      operationId: listItineraryDays
      tags: [itineraries]
      summary: List days for an itinerary
      parameters:
        - name: itineraryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of days
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItineraryDay"
    post:
      operationId: createItineraryDay
      tags: [itineraries]
      summary: Add a day to an itinerary
      parameters:
        - name: itineraryId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItineraryDayInput"
      responses:
        "201":
          description: Day created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItineraryDay"

  /itineraries/{itineraryId}/days/{dayId}:
    patch:
      operationId: updateItineraryDay
      tags: [itineraries]
      summary: Update an itinerary day
      parameters:
        - name: itineraryId
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItineraryDayUpdate"
      responses:
        "200":
          description: Updated day
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItineraryDay"
    delete:
      operationId: deleteItineraryDay
      tags: [itineraries]
      summary: Delete an itinerary day
      parameters:
        - name: itineraryId
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── HOTELS ─────────────────────────────────────────────────────────────────
  /hotels:
    get:
      operationId: listHotels
      tags: [hotels]
      summary: List hotels in the agency catalog
      responses:
        "200":
          description: List of hotels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hotel"
    post:
      operationId: createHotel
      tags: [hotels]
      summary: Add hotel to agency catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HotelInput"
      responses:
        "201":
          description: Hotel created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hotel"

  /hotels/{hotelId}:
    get:
      operationId: getHotel
      tags: [hotels]
      summary: Get hotel detail
      parameters:
        - name: hotelId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hotel detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hotel"
        "404":
          description: Not found
    patch:
      operationId: updateHotel
      tags: [hotels]
      summary: Update hotel
      parameters:
        - name: hotelId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HotelUpdate"
      responses:
        "200":
          description: Updated hotel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Hotel"

  # ─── ACTIVITIES ─────────────────────────────────────────────────────────────
  /activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: List activities in the agency catalog
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"
    post:
      operationId: createActivity
      tags: [activities]
      summary: Add activity to agency catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityInput"
      responses:
        "201":
          description: Activity created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  /activities/{activityId}:
    get:
      operationId: getActivity
      tags: [activities]
      summary: Get activity detail
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activity detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "404":
          description: Not found
    patch:
      operationId: updateActivity
      tags: [activities]
      summary: Update activity
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityUpdate"
      responses:
        "200":
          description: Updated activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
    delete:
      operationId: deleteActivity
      tags: [activities]
      summary: Delete activity
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── TRIPS ──────────────────────────────────────────────────────────────────
  /trips:
    get:
      operationId: listTrips
      tags: [trips]
      summary: List trips for the agency
      responses:
        "200":
          description: List of trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"
    post:
      operationId: createTrip
      tags: [trips]
      summary: Create a trip from an itinerary or from scratch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripInput"
      responses:
        "201":
          description: Trip created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{tripId}:
    get:
      operationId: getTrip
      tags: [trips]
      summary: Get trip detail with days and invitations
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trip detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetail"
        "404":
          description: Not found
    patch:
      operationId: updateTrip
      tags: [trips]
      summary: Update trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripUpdate"
      responses:
        "200":
          description: Updated trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
    delete:
      operationId: deleteTrip
      tags: [trips]
      summary: Delete trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── INVITATIONS ─────────────────────────────────────────────────────────────
  /trips/{tripId}/invitations:
    get:
      operationId: listInvitations
      tags: [invitations]
      summary: List invitations for a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of invitations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invitation"
    post:
      operationId: sendInvitations
      tags: [invitations]
      summary: Send invitations to travelers for a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationInput"
      responses:
        "201":
          description: Invitations sent
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invitation"

  /invitations/{code}/accept:
    post:
      operationId: acceptInvitation
      tags: [invitations]
      summary: Accept an invitation using the unique code
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invitation accepted, trip linked to traveler
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invitation"
        "404":
          description: Code not found
        "409":
          description: Already accepted

  # ─── TRAVELER FRONT DESK ─────────────────────────────────────────────────────
  /me/trips:
    get:
      operationId: listMyTrips
      tags: [traveler]
      summary: Get all trips for the logged-in traveler (agency + personal)
      responses:
        "200":
          description: List of traveler trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TravelerTrip"
    post:
      operationId: createMyTrip
      tags: [traveler]
      summary: Create a personal trip for the logged-in traveler
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePersonalTripInput"
      responses:
        "201":
          description: Trip created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelerTrip"
        "400":
          description: Validation error

  /me/trips/{tripId}:
    get:
      operationId: getMyTrip
      tags: [traveler]
      summary: Get traveler's trip detail with full itinerary
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trip detail for traveler
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelerTripDetail"
        "404":
          description: Not found
    patch:
      operationId: updateMyTrip
      tags: [traveler]
      summary: Update a personal trip's metadata
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyTripInput"
      responses:
        "200":
          description: Updated trip detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelerTripDetail"
        "403":
          description: Not your trip
        "404":
          description: Not found

  /me/trips/{tripId}/days:
    post:
      operationId: createTripDay
      tags: [traveler]
      summary: Add a day to a personal trip's itinerary
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonalTripDayInput"
      responses:
        "201":
          description: Day created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDay"
        "403":
          description: Not your trip

  /me/trips/{tripId}/days/{dayId}:
    patch:
      operationId: updateTripDay
      tags: [traveler]
      summary: Update a day in a personal trip's itinerary
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonalTripDayInput"
      responses:
        "200":
          description: Day updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDay"
        "403":
          description: Not your trip
        "404":
          description: Day not found
    delete:
      operationId: deleteTripDay
      tags: [traveler]
      summary: Delete a day from a personal trip's itinerary
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Not your trip

  /me/trips/{tripId}/notes:
    get:
      operationId: listMyTripNotes
      tags: [traveler]
      summary: Get personal notes for a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripNote"
    post:
      operationId: createTripNote
      tags: [traveler]
      summary: Create a personal note for a trip day
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripNoteInput"
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripNote"

  /me/trips/{tripId}/notes/{noteId}:
    patch:
      operationId: updateTripNote
      tags: [traveler]
      summary: Update a personal note
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripNoteUpdate"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripNote"
    delete:
      operationId: deleteTripNote
      tags: [traveler]
      summary: Delete a personal note
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: noteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── TRIP SHARES ─────────────────────────────────────────────────────────────

  /me/trips/{tripId}/shares:
    get:
      operationId: listTripShares
      tags: [traveler]
      summary: List shares for a trip owned by the current traveler
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of shares
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripShare"
    post:
      operationId: shareTrip
      tags: [traveler]
      summary: Share a trip with another user by email
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShareTripInput"
      responses:
        "201":
          description: Share created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripShare"
        "400":
          description: Validation error
        "403":
          description: Not the trip owner

  /me/trips/{tripId}/shares/{shareId}:
    delete:
      operationId: revokeTripShare
      tags: [traveler]
      summary: Revoke a trip share
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: shareId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Revoked

  /me/shared-trips:
    get:
      operationId: listSharedWithMe
      tags: [traveler]
      summary: List trips shared with the current traveler (all statuses)
      responses:
        "200":
          description: List of share entries with trip info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SharedTripEntry"

  /me/shares/{shareCode}/accept:
    post:
      operationId: acceptTripShare
      tags: [traveler]
      summary: Accept a trip share by code
      parameters:
        - name: shareCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Share accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripShare"
        "404":
          description: Share not found or already handled

  # ─── DAY ACTIVITIES ─────────────────────────────────────────────────────────
  /itineraries/parse-pdf:
    post:
      operationId: parseItineraryPdf
      tags: [itineraries]
      summary: Parse a PDF/text document to extract itinerary structure via AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParsePdfInput"
      responses:
        "200":
          description: Parsed itinerary structure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParsedItinerary"

  /itineraries/{itineraryId}/days/{dayId}/activities:
    get:
      operationId: listDayActivities
      tags: [itineraries]
      summary: List activities linked to an itinerary day
      parameters:
        - name: itineraryId
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of day activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DayActivity"
    post:
      operationId: addDayActivity
      tags: [itineraries]
      summary: Link an activity to an itinerary day
      parameters:
        - name: itineraryId
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DayActivityInput"
      responses:
        "201":
          description: Activity linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DayActivity"

  /itineraries/{itineraryId}/days/{dayId}/activities/{linkId}:
    delete:
      operationId: removeDayActivity
      tags: [itineraries]
      summary: Unlink an activity from an itinerary day
      parameters:
        - name: itineraryId
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
        - name: linkId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Unlinked

  # ─── DASHBOARD ───────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Agency dashboard summary — trips by status, occupancy, recent activity
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

