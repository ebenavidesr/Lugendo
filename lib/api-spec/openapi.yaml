      required: [content]
      properties:
        content:
          type: string

    # ─── TRIP SHARES ─────────────────────────────────────────────────────────
    TripShare:
      type: object
      required: [id, tripId, ownerId, sharedWithEmail, shareCode, permission, status, createdAt]
      properties:
        id:
          type: integer
        tripId:
          type: integer
        ownerId:
          type: integer
        sharedWithEmail:
          type: string
        sharedWithUserId:
          type: ["integer", "null"]
        shareCode:
          type: string
        permission:
          type: string
          enum: [full, read]
        status:
          type: string
          enum: [pending, accepted, rejected]
        createdAt:
          type: string

    ShareTripInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        permission:
          type: string
          enum: [full, read]
          default: read

    UpdateShareInput:
      type: object
      required: [permission]
      properties:
        permission:
          type: string
          enum: [full, read]

    SharedTripEntry:
      type: object
      required: [shareId, shareCode, permission, status, createdAt, trip]
      properties:
        shareId:
          type: integer
        shareCode:
          type: string
        permission:
          type: string
          enum: [full, read]
        status:
          type: string
          enum: [pending, accepted, rejected]
        createdAt:
          type: string
        trip:
          $ref: "#/components/schemas/TravelerTrip"

    # ─── PDF PARSE / DAY ACTIVITIES ─────────────────────────────────────────
    SuggestDayDescriptionInput:
      type: object
      required: [dayNumber]
      properties:
        dayNumber:
          type: integer
        cityFrom:
          type: string
        cityTo:
          type: string
        activities:
          type: array
          items:
            type: string
        writingTone:
          type: string
          enum: [informative, friendly, adventurous, luxury, professional]

    SuggestDayDescriptionResult:
      type: object
      required: [description]
      properties:
        description:
          type: string

    ParsePdfInput:
      type: object
      required: [fileBase64, fileName]
      properties:
        fileBase64:
          type: string
          description: Base64-encoded PDF or text file content
        fileName:
          type: string

    ParsedItinerary:
      type: object
      required: [name, numDays, days]
      properties:
        name:
          type: string
        numDays:
          type: integer
        description:
          type: ["string", "null"]
        countries:
          type: array
          items:
            type: string
        startDate:
          type: ["string", "null"]
          description: "ISO date string (YYYY-MM-DD) if the document specifies a start date"
        endDate:
          type: ["string", "null"]
          description: "ISO date string (YYYY-MM-DD) if the document specifies an end date"
        days:
          type: array
          items:
            $ref: "#/components/schemas/ParsedDay"

    ParsedDay:
      type: object
      required: [dayNumber]
      properties:
        dayNumber:
          type: integer
        cityFrom:
          type: ["string", "null"]
        cityTo:
          type: ["string", "null"]
        transport:
          $ref: "#/components/schemas/TransportMode"
        description:
          type: ["string", "null"]
        activities:
          type: array
          items:
            type: string
        hotels:
          type: array
          items:
            type: string

    DayActivity:
      type: object
      required: [id, dayId, activityName, sortOrder, included, canEdit, createdAt]
      properties:
        id:
          type: integer
        dayId:
          type: integer
        activityId:
          type: ["integer", "null"]
        activityName:
          type: string
        activityCategory:
          type: ["string", "null"]
        sortOrder:
          type: integer
        startTime:
          type: ["string", "null"]
        endTime:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        durationHours:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        companyContact:
          type: ["string", "null"]
        addressOverride:
          type: ["string", "null"]
        included:
          type: boolean
        transportMode:
          $ref: "#/components/schemas/TransportMode"
        canEdit:
          type: boolean
        createdAt:
          type: string

    DayActivityInput:
      type: object
      properties:
        activityId:
          type: integer
        activityTitle:
          type: string
        sortOrder:
          type: integer
        startTime:
          type: string
        endTime:
          type: string
        notes:
          type: string
        companyContact:
          type: string
        addressOverride:
          type: string
        included:
          type: boolean
        transportMode:
          $ref: "#/components/schemas/TransportMode"

    ItineraryDayActivityUpdate:
      type: object
      properties:
        startTime:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    TripDayActivityUpdate:
      type: object
      properties:
        startTime:
          type: ["string", "null"]
        endTime:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        companyContact:
          type: ["string", "null"]
        addressOverride:
          type: ["string", "null"]
        included:
          type: boolean
        transportMode:
          $ref: "#/components/schemas/TransportMode"
        activityTitle:
          type: ["string", "null"]

    # ─── DASHBOARD ───────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [tripsByStatus, totalTravelers, upcomingTrips, recentInvitations]
      properties:
        tripsByStatus:
          type: object
          required: [draft, scheduled, active, finished, cancelled]
          properties:
            draft:
              type: integer
            scheduled:
              type: integer
            active:
              type: integer
            finished:
              type: integer
            cancelled:
              type: integer
        totalTravelers:
          type: integer
        upcomingTrips:
          type: array
          items:
            $ref: "#/components/schemas/Trip"
        recentInvitations:
          type: array
          items:
            $ref: "#/components/schemas/Invitation"
        occupancyAlerts:
          type: array
          items:
            $ref: "#/components/schemas/Trip"

    # ─── DESTINATIONS ─────────────────────────────────────────────────────────
    DestinationDescribeInput:
      type: object
      required: [query, type]
      properties:
        query:
          type: string
          description: Search query (destination name, hotel name, activity name, etc.)
        type:
          type: string
          enum: [destination, hotel, activity]

    DestinationDescribeResult:
      type: object
      required: [description]
      properties:
        description:
          type: string
