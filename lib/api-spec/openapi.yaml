components:
  schemas:
    HealthStatus:
      type: object
      required: [ok, version]
      properties:
        ok:
          type: boolean
        version:
          type: string

    # ─── AUTH ─────────────────────────────────────────────────────────────────
    AuthUser:
      type: object
      required: [id, email, name, role]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, manager, agent, traveler]
        agencyId:
          type: ["integer", "null"]
        agencyName:
          type: ["string", "null"]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    RegisterInput:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 8
        name:
          type: string
        inviteCode:
          type: string

    # ─── AGENCY ───────────────────────────────────────────────────────────────
    Agency:
      type: object
      required: [id, name, slug, active, createdAt, writingTone]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        logoUrl:
          type: ["string", "null"]
        primaryColor:
          type: ["string", "null"]
        writingTone:
          type: string
          enum: [informative, friendly, adventurous, luxury, professional]
        active:
          type: boolean
        createdAt:
          type: string

    AgencyInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        logoUrl:
          type: string
        primaryColor:
          type: string
        writingTone:
          type: string
          enum: [informative, friendly, adventurous, luxury, professional]

    AgencyUpdate:
      type: object
      properties:
        name:
          type: string
        logoUrl:
          type: string
        primaryColor:
          type: string
        writingTone:
          type: string
          enum: [informative, friendly, adventurous, luxury, professional]
        active:
          type: boolean

    # ─── USER ─────────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, email, name, role, active, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, manager, agent, traveler]
        agencyId:
          type: ["integer", "null"]
        active:
          type: boolean
        createdAt:
          type: string

    UserInput:
      type: object
      required: [email, name, role]
      properties:
        email:
          type: string
        name:
          type: string
        role:
          type: string
